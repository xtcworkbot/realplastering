<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0B0B0C;
    --bone: #F5EFE3;
    --paper: #FBF7EE;
    --gold: #B8924C;
    --gold-deep: #8C6A2E;
    --gold-light: #D9B97A;
    --clay: #A0563B;
    --line: #E2D7BE;
    --muted: #5C544A;
    --google-yellow: #FBBC04;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Manrope', sans-serif;
    background:
      radial-gradient(900px 600px at 80% -10%, rgba(232,199,122,0.30), transparent 55%),
      radial-gradient(700px 500px at -10% 30%, rgba(160,86,59,0.10), transparent 60%),
      var(--bone);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .grain::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.04  0 0 0 0 0.04  0 0 0 0 0.04  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.35; mix-blend-mode: multiply;
  }
  .font-display { font-family: 'Saira Condensed', sans-serif; letter-spacing: -0.012em; }
  .font-serif { font-family: 'Fraunces', Georgia, serif; }
  .container { width: 1200px; height: 630px; position: relative; display: flex; overflow: hidden; }
  .left {
    flex: 0 0 720px; padding: 52px 60px; position: relative; z-index: 2;
    display: flex; flex-direction: column;
  }
  .right {
    flex: 1; position: relative; overflow: hidden;
    border-left: 1px solid var(--line);
  }
  .right img {
    width: 100%; height: 100%; object-fit: cover; object-position: center;
  }
  .right::after {
    content: ""; position: absolute; inset: 0;
    background:
      linear-gradient(90deg, rgba(245,239,227,0.15), transparent 20%),
      linear-gradient(180deg, transparent 60%, rgba(11,11,12,0.5));
  }
  .brand-row { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 52px; height: 52px; border-radius: 9px; background: var(--ink);
    display: flex; align-items: center; justify-content: center;
    color: var(--gold-light);
  }
  .brand-name {
    font-family: 'Saira Condensed'; font-weight: 800;
    font-size: 26px; line-height: 1; letter-spacing: -0.01em;
  }
  .brand-name span { color: var(--gold-deep); }
  .brand-sub {
    font-family: 'Saira Condensed'; font-weight: 600;
    font-size: 11px; letter-spacing: 0.32em; color: var(--muted);
    margin-top: 6px;
  }

  .meta-row {
    margin-top: 32px;
    display: flex; align-items: center; gap: 12px;
    font-family: 'Saira Condensed'; font-weight: 600;
    font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--muted);
  }
  .meta-row .bar { width: 32px; height: 1px; background: var(--gold); }
  .meta-row .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--clay); }

  h1 {
    font-family: 'Saira Condensed', sans-serif;
    font-weight: 900; text-transform: uppercase;
    font-size: 108px; line-height: 0.88; letter-spacing: -0.012em;
    margin-top: 22px;
  }
  h1 .gold { color: var(--gold-deep); position: relative; display: inline-block; }
  h1 .gold svg.underline {
    position: absolute; left: 0; bottom: -10px; width: 100%; height: 8px;
  }

  .trust-band {
    margin-top: auto;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 32px;
  }
  .trust-item .label {
    font-family: 'Saira Condensed'; font-weight: 600;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); margin-top: 6px;
  }
  .trust-item .value {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Saira Condensed'; font-weight: 800;
    font-size: 22px; line-height: 1;
  }
  .stars {
    color: var(--google-yellow);
    display: inline-flex; gap: 1px;
  }
  .trust-item .num {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 26px; line-height: 1;
  }
  .trust-item .num span { color: var(--gold); }

  .phone-pill {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--ink); color: var(--paper);
    padding: 12px 20px; border-radius: 999px;
    font-family: 'Saira Condensed'; font-weight: 700;
    font-size: 16px; letter-spacing: 0.14em; text-transform: uppercase;
    margin-top: 28px; align-self: flex-start;
  }
  .phone-pill .iconwrap {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--gold); color: var(--ink);
    display: flex; align-items: center; justify-content: center;
  }

  /* gold seal on image */
  .seal {
    position: absolute; top: 36px; right: 36px;
    width: 108px; height: 108px; border-radius: 50%;
    background: var(--ink); color: var(--gold-light);
    border: 3px solid var(--bone);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; line-height: 1;
    box-shadow: 0 22px 36px -14px rgba(11,11,12,0.55);
    z-index: 3;
  }
  .seal .big {
    font-family: 'Saira Condensed'; font-weight: 900; font-size: 30px;
  }
  .seal .stars-row {
    color: var(--google-yellow); font-size: 11px; margin-top: 4px; letter-spacing: 1px;
  }
  .seal .small {
    font-family: 'Saira Condensed'; font-weight: 600;
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--gold-light); opacity: 0.85; margin-top: 4px;
  }

  /* EST badge floating */
  .est-badge {
    position: absolute; bottom: 32px; right: 32px;
    width: 84px; height: 84px; border-radius: 50%;
    background: var(--clay); color: var(--paper);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 18px 30px -12px rgba(160,86,59,0.55);
    z-index: 3;
  }
  .est-badge .l1 { font-family: 'Saira Condensed'; font-weight: 900; font-size: 11px; letter-spacing: 0.16em; }
  .est-badge .l2 { font-family: 'Saira Condensed'; font-weight: 900; font-size: 24px; line-height: 1; margin-top: 2px; }

  /* bottom tag pill on image */
  .img-tag {
    position: absolute; left: 32px; bottom: 32px;
    background: rgba(251,247,238,0.95);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 8px 16px;
    font-family: 'Saira Condensed'; font-weight: 700;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink); display: flex; align-items: center; gap: 8px;
    z-index: 3;
  }
  .img-tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--clay); }

  /* gold corner ornaments */
  .corner { position: absolute; width: 36px; height: 36px; border: 2px solid var(--gold); z-index: 2; }
  .corner.tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
  .corner.br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }
</style>
</head>
<body>
<div class="container grain">

  <!-- gold corner brackets -->
  <span class="corner tl"></span>
  <span class="corner br"></span>

  <!-- LEFT -->
  <div class="left">
    <div class="brand-row">
      <div class="brand-mark">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
          <path d="M5 22 L22 5 L27 10 L10 27 Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M14 14 L22 22" stroke="currentColor" stroke-width="2"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">REAL <span>PLASTERING</span></div>
        <div class="brand-sub">PERTH · WESTERN AUSTRALIA</div>
      </div>
    </div>

    <div class="meta-row">
      <span class="bar"></span>
      <span>№ 01 — Master Plasterers</span>
      <span class="dot"></span>
      <span>Est. Perth</span>
    </div>

    <h1>
      A real<br/>
      Finish built<br/>
      to <span class="gold">last.
        <svg class="underline" viewBox="0 0 300 8" preserveAspectRatio="none" fill="none">
          <path d="M2 6 C 60 1, 140 1, 298 5" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
          <defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#D9B97A"/><stop offset="0.5" stop-color="#B8924C"/><stop offset="1" stop-color="#8C6A2E"/></linearGradient></defs>
        </svg>
      </span>
    </h1>

    <div class="trust-band">
      <div class="trust-item">
        <div class="value">
          <!-- google G -->
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          5.0
          <span class="stars">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .587l3.668 7.431L24 9.75l-6 5.852L19.336 24 12 19.897 4.664 24 6 15.602 0 9.75l8.332-1.732z"/></svg>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .587l3.668 7.431L24 9.75l-6 5.852L19.336 24 12 19.897 4.664 24 6 15.602 0 9.75l8.332-1.732z"/></svg>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .587l3.668 7.431L24 9.75l-6 5.852L19.336 24 12 19.897 4.664 24 6 15.602 0 9.75l8.332-1.732z"/></svg>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .587l3.668 7.431L24 9.75l-6 5.852L19.336 24 12 19.897 4.664 24 6 15.602 0 9.75l8.332-1.732z"/></svg>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .587l3.668 7.431L24 9.75l-6 5.852L19.336 24 12 19.897 4.664 24 6 15.602 0 9.75l8.332-1.732z"/></svg>
          </span>
        </div>
        <div class="label">48 Google Reviews</div>
      </div>
      <div class="trust-item">
        <div class="num">30<span>+</span></div>
        <div class="label">Years On The Tools</div>
      </div>
      <div class="trust-item">
        <div class="num">600<span>+</span></div>
        <div class="label">Homes Finished</div>
      </div>
    </div>

    <div class="phone-pill">
      <span class="iconwrap">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/></svg>
      </span>
      Call Nick · 0422 945 207
    </div>
  </div>

  <!-- RIGHT image with badges -->
  <div class="right">
    <img src="assets/2020-11-10.webp" alt="" />

    <div class="seal">
      <div class="big">5.0</div>
      <div class="stars-row">★★★★★</div>
      <div class="small">Google</div>
    </div>

    <div class="est-badge">
      <div class="l1">EST.</div>
      <div class="l2">2010</div>
    </div>

    <div class="img-tag">
      <span class="dot"></span>
      Project · Perth Metro
    </div>
  </div>

</div>
</body>
</html>
